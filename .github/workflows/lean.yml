name: Lean

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: leanprover/lean-action@v1
      - name: Audit tracked Lean sources
        run: bash scripts/check_sources.sh
      - name: Compile paper-facing interfaces
        run: lake env lean PaperAudit.lean
      - name: Enforce axiom allowlist
        run: python3 scripts/check_axioms.py
      - name: Check fixed-link declaration locations
        run: python3 scripts/paper_links.py --check-only
      - name: Generate artifact metadata preview
        run: python3 scripts/artifact_metadata.py --format markdown
