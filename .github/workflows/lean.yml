name: Lean

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
      - name: Audit Lean project sources
        shell: bash
        run: |
          if rg -n --pcre2 '\b(sorry|admit)\b' MyProject --glob '*.lean'; then
            echo "Found sorry or admit in project Lean sources."
            exit 1
          fi
          if rg -n --pcre2 '^\s*(axiom|unsafe)\b' MyProject --glob '*.lean'; then
            echo "Found a project axiom or unsafe declaration."
            exit 1
          fi
      - name: Report axioms of core declarations
        run: lake env lean Audit.lean
